variables:
  IMAGE_PREFIX: $CI_REGISTRY/barkhauseninstitut/wicon/hermespy
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GIT_SUBMODULE_STRATEGY: recursive
  HERMES_VERSION: "1.6.0"
  HERMES_WHEEL_14: "hermespy-$HERMES_VERSION-cp314-cp314-linux_x86_64.whl"
  HERMES_WHEEL_13: "hermespy-$HERMES_VERSION-cp313-cp313-linux_x86_64.whl"
  HERMES_WHEEL_12: "hermespy-$HERMES_VERSION-cp312-cp312-linux_x86_64.whl"
  HERMES_WHEEL_11: "hermespy-$HERMES_VERSION-cp311-cp311-linux_x86_64.whl"
  PYDEVD_DISABLE_FILE_VALIDATION: 1

# Run pipeline only on merge requests or on the default branch
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  auto_cancel:
    on_new_commit: interruptible

stages:
  - build
  - test
  - lint
  - deploy

cache:
  key: build-cache
  paths:
    - dist/

Build Python 3.14:
  image: $IMAGE_PREFIX/cp314:latest
  stage: build
  before_script:
    - python -m pip install --no-cache-dir --root-user-action ignore -q pip-tools
    - pip-compile --quiet --build-deps-for wheel --allow-unsafe -o /tmp/build-requirements.txt pyproject.toml
    - python -m pip install --no-cache-dir --root-user-action ignore -q -r /tmp/build-requirements.txt
  script:
    - export MAKEFLAGS="-j $(grep -c ^processor /proc/cpuinfo)"
    - python -m build --quiet --no-isolation
  artifacts:
    paths:
      - dist/$HERMES_WHEEL_14
      - build/cp314-cp314-linux_x86_64

Build Python 3.13:
  image: $IMAGE_PREFIX/cp313:latest
  stage: build
  before_script:
    - python -m pip install --no-cache-dir --root-user-action ignore -q pip-tools
    - pip-compile --quiet --strip-extras --build-deps-for wheel --allow-unsafe -o /tmp/build-requirements.txt pyproject.toml
    - python -m pip install --no-cache-dir --root-user-action ignore -q -r /tmp/build-requirements.txt
  script:
    - export MAKEFLAGS="-j $(grep -c ^processor /proc/cpuinfo)"
    - python -m build --quiet --no-isolation
  artifacts:
    paths:
      - dist/$HERMES_WHEEL_13
      - build/cp313-cp313-linux_x86_64

Build Python 3.12:
  image: $IMAGE_PREFIX/cp312:latest
  stage: build
  before_script:
    - python -m pip install --no-cache-dir --root-user-action ignore -q pip-tools
    - pip-compile --quiet --build-deps-for wheel --allow-unsafe -o /tmp/build-requirements.txt pyproject.toml
    - python -m pip install --no-cache-dir --root-user-action ignore -q -r /tmp/build-requirements.txt
  script:
    - export MAKEFLAGS="-j $(grep -c ^processor /proc/cpuinfo)"
    - python -m build --quiet --no-isolation
  artifacts:
    paths:
      - dist/$HERMES_WHEEL_12
      - build/cp312-cp312-linux_x86_64
  
Build Python 3.11:
  image: $IMAGE_PREFIX/cp311:latest
  stage: build
  before_script:
    - python -m pip install --no-cache-dir --root-user-action ignore -q pip-tools
    - pip-compile --quiet --build-deps-for wheel --allow-unsafe -o /tmp/build-requirements.txt pyproject.toml
    - python -m pip install --no-cache-dir --root-user-action ignore -q -r /tmp/build-requirements.txt
  script:
    - export MAKEFLAGS="-j $(grep -c ^processor /proc/cpuinfo)"
    - python -m build --quiet --no-isolation
  artifacts:
    paths:
      - dist/$HERMES_WHEEL_11
      - build/cp311-cp311-linux_x86_64

Unit Testing:
  image: $IMAGE_PREFIX/cp312:latest
  stage: test
  dependencies:
    - Build Python 3.12
  before_script:
    # This is a workaround, since the upstream PyPi package is not compatible with Python 3.12 yet.
    # The package is installed from the internal gitlab repository instead.
    - pip install -q git+https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.barkhauseninstitut.org/barkhauseninstitut/wicon/hermespy-uhd-wrapper.git#egg=usrp-uhd-client
    - pip install -q dist/$HERMES_WHEEL_12[audio,quadriga,scapy,sionna]
  script:
    - coverage run --include=hermespy/* ./tests/test_install.py unit_tests
  after_script:
    - coverage xml
    - coverage report -m --include=hermespy/* --skip-covered
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - ./scripts/performance/results/unit_tests/results.json
  
Integration Testing:
  image: $IMAGE_PREFIX/cp312:latest
  stage: test
  dependencies:
    - Build Python 3.12
  before_script:
    - pip install -q dist/$HERMES_WHEEL_12[audio,quadriga,scapy,sionna,uhd]
  script:
    - python ./tests/test_install.py integration_tests
  artifacts:
    paths:
      - ./scripts/performance/results/integration_tests/results.json

Integrity Python 3.14:
  image: $IMAGE_PREFIX/cp314:latest
  stage: test
  dependencies:
    - Build Python 3.14
  before_script:
    - pip install -q dist/$HERMES_WHEEL_14[audio,quadriga,scapy,sionna,uhd]
  script:
    - python ./tests/test_install.py integrity_tests
  artifacts:
    paths:
      - ./scripts/performance/results/integration_tests/results.json

Integrity Python 3.13:
  image: $IMAGE_PREFIX/cp313:latest
  stage: test
  dependencies:
    - Build Python 3.13
  before_script:
    - pip install -q dist/$HERMES_WHEEL_13[audio,quadriga,scapy,sionna,uhd]
  script:
    - python ./tests/test_install.py integrity_tests
  artifacts:
    paths:
      - ./scripts/performance/results/integration_tests/results.json

Integrity Python 3.12:
  image: $IMAGE_PREFIX/cp312:latest
  stage: test
  dependencies:
    - Build Python 3.12
  before_script:
    - pip install -q dist/$HERMES_WHEEL_12[audio,quadriga,scapy,sionna,uhd]
  script:
    - python ./tests/test_install.py integrity_tests
  artifacts:
    paths:
      - ./scripts/performance/results/integration_tests/results.json

Integrity Python 3.11:
  image: $IMAGE_PREFIX/cp311:latest
  stage: test
  dependencies:
    - Build Python 3.11
  before_script:
    - /opt/python/cp311-cp311/bin/pip install -q dist/$HERMES_WHEEL_11[audio,quadriga,scapy,sionna,uhd]
  script:
    - python ./tests/test_install.py integrity_tests
  artifacts:
    paths:
      - ./scripts/performance/results/integration_tests/results.json

PEP8 Testing:
  image: $IMAGE_PREFIX/cp312:latest
  stage: lint
  script:
    - flake8 hermespy/

Type Checking:
  image: $IMAGE_PREFIX/cp312:latest
  stage: lint
  script:
    - mypy

Documentation:
  image: $IMAGE_PREFIX/cp312:latest
  stage: lint
  before_script:
    # This is a workaround, since the upstream PyPi package is not compatible with Python 3.12 yet.
    # The package is installed from the internal gitlab repository instead.
    - pip install -q git+https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.barkhauseninstitut.org/barkhauseninstitut/wicon/hermespy-uhd-wrapper.git#egg=usrp-uhd-client
    - pip install -q dist/$HERMES_WHEEL_12[audio,quadriga,scapy,sionna]
  script:
    - sphinx-build -q -W -j auto ./docssource/ ./documentation/

pages:
  image: $IMAGE_PREFIX/cp312:latest
  stage: deploy
  only:
    - master
  before_script:
    - pip install -q dist/$HERMES_WHEEL_12[audio,quadriga,scapy,sionna,uhd]
  script:
    - sphinx-build -q -j auto ./docssource/ ./public/
  artifacts:
    paths:
      - public
